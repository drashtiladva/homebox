name: backend
on:
  pull_request:
    branches:
      - drashtiladva-patch-1
  push:
    branches:
      - main
  workflow_call: {}

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Initialize Go module
        run: go mod tidy

      - name: Lint Go code
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

      - name: Build Go project
        run: go build -v ./... 
